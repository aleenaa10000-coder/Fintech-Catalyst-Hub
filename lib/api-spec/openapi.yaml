          type: string
          minLength: 1
        content:
          type: string
          minLength: 1
        author:
          type: string
          minLength: 1
        authorRole:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        tags:
          type: array
          items:
            type: string
        coverImage:
          type: string
          format: uri
        readingMinutes:
          type: integer
          minimum: 1
        featured:
          type: boolean
        seoTitle:
          type: string
          nullable: true
          description: >
            Override the `<title>` tag for this post. Pass an empty string
            or `null` to clear an existing override and fall back to the
            post's `title`.
        seoDescription:
          type: string
          nullable: true
          description: >
            Override `<meta name="description">` for this post. Pass an
            empty string or `null` to clear an existing override and fall
            back to the post's `excerpt`.
        seoOgImage:
          type: string
          nullable: true
          description: >
            Override `og:image` / `twitter:image` for this post. Pass an
            empty string or `null` to clear an existing override and fall
            back to the post's `coverImage`.
        noIndex:
          type: boolean
          description: >
            When true, the public post detail page will emit
            `<meta name="robots" content="noindex,nofollow">`, hiding the
            post from search engines while keeping it accessible by URL.

    SeoNotification:
      type: object
      description: |
        Result of the immediate search-engine notification triggered when
        a post is published or updated. The IndexNow ping is awaited (with
        a short timeout) so the admin UI can show real success/failure
        feedback. The Google sitemap ping is best-effort and informational.
      properties:
        indexNow:
          type: object
          properties:
            status:
              type: string
              enum:
                - accepted
                - rejected
                - skipped_no_key
                - skipped_malformed_key
                - error
            httpStatus:
              type: integer
            message:
              type: string
            urlsSubmitted:
              type: integer
              minimum: 0
          required: [status, message, urlsSubmitted]
        google:
          type: object
          properties:
            status:
              type: string
              enum: [attempted, error]
            httpStatus:
              type: integer
            message:
              type: string
          required: [status, message]
        urls:
          type: array
          items:
            type: string
        durationMs:
          type: integer
          minimum: 0
      required: [indexNow, google, urls, durationMs]

    PublishedBlogPost:
