openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FintechPressHub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Blog posts
  - name: pricing
    description: Pricing plans
  - name: services
    description: Agency services
  - name: contact
    description: Contact form submissions
  - name: guestPost
    description: Guest post submissions
  - name: stats
    description: Site statistics / trust signals
  - name: newsletter
    description: Newsletter subscriptions
  - name: tools
    description: Free interactive tools (calculators, etc.)
  - name: commissioningTopics
    description: Editor-curated guest post topics currently being commissioned
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after callback.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /admin-auth/login:
    post:
      tags: [Auth]
      operationId: loginAdminWithPassword
      summary: Sign an admin in with email and password
      description: |
        Email-and-password admin login for self-hosted deployments
        (e.g. Hostinger) where Replit OIDC is not available. The user's
        email must be on the `ADMIN_EMAILS` allowlist; the password is
        compared against the bcrypt hash on `users.password_hash` (seeded
        from the `ADMIN_PASSWORD` env var on first start).
        On success, sets the `sid` session cookie and returns the
        authenticated admin user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Logged in successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
        '400':
          description: Missing or invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Email or password is incorrect.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Email is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /admin-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutAdminSession
      summary: Clear the admin session cookie
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /blog/posts:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List published blog posts
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"
    post:
      operationId: publishBlogPost
      tags: [blog]
      summary: Publish a new blog post (admin)
      description: |
        Inserts a new blog post and notifies search engines. Requires an
        authenticated session. The response includes a `seoNotification`
        object describing the immediate IndexNow + Google sitemap ping
        result so the admin UI can show real success/failure feedback
        instead of a fire-and-forget toast.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishBlogPostInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedBlogPost"
        "401":
          description: Unauthorized
        "409":
          description: A post with this slug already exists

  /blog/posts/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
    patch:
      operationId: updateBlogPost
      tags: [blog]
      summary: Update a blog post by slug (admin)
      description: |
        Updates a blog post and re-notifies search engines. The response
        includes a `seoNotification` object describing the immediate
        IndexNow + Google sitemap ping result.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogPostInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedBlogPost"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteBlogPost
      tags: [blog]
      summary: Delete (unpublish) a blog post by slug (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/blog/posts/bulk-noindex:
    post:
      operationId: bulkNoIndexBlogPosts
      tags: [blog]
      summary: Bulk set the no-index flag on multiple blog posts (admin)
      description: |
        Sets `noIndex` on every post whose slug is in the request body in a
        single transaction. Used by the blog admin to hide a batch of older
        posts from search engines (or to un-hide them) in one click. Returns
        the updated rows so the admin UI can refresh its list without a
        round-trip. Requires an authenticated admin session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkNoIndexBlogPostsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkNoIndexBlogPostsResult"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required

  /blog/posts/{slug}/reping-indexnow:
    post:
      operationId: repingBlogPostIndexNow
      tags: [blog]
      summary: Re-ping IndexNow for a single blog post (admin)
      description: |
        Triggers an immediate IndexNow + Google sitemap ping for the post
        with this slug. Used by the admin posts table to manually re-submit
        a post (e.g. after a stale "indexed N days ago" badge or after the
        first publish missed because `INDEXNOW_KEY` was unset). Requires an
        authenticated admin session. The response mirrors the
        publish/update endpoints — a `PublishedBlogPost` with the live ping
        result attached so the UI can show real success/failure feedback.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Re-pinged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedBlogPost"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/sitemap-health:
    get:
      operationId: getSitemapHealth
      tags: [admin]
      summary: Latest sitemap link-check report (admin)
      description: |
        Returns the most recent persisted link-check results for every URL
        in the sitemap (blog posts, static routes, author profiles, RSS
        feeds). Read-only — does not trigger a fresh check. Pair with
        `POST /admin/sitemap-health/run` from the admin dashboard to
        refresh the data on demand.
      responses:
        "200":
          description: Sitemap health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitemapHealthReport"
        "401":
          description: Unauthorized
    post:
      operationId: runSitemapHealth
      tags: [admin]
      summary: Run a fresh sitemap link check (admin)
      description: |
        Synchronously walks the sitemap, fetches every URL, persists the
        latest status code per URL, and returns the resulting report.
        Awaits all fetches with a per-URL timeout so the admin dashboard
        gets a live result instead of a "kicked off" toast.
      responses:
        "200":
          description: Sitemap health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitemapHealthReport"
        "401":
          description: Unauthorized

  /blog/posts/{slug}/view:
    post:
      operationId: incrementBlogPostView
      tags: [blog]
      summary: Increment a post's lifetime view counter
      description: |
        Atomically bumps `view_count` by 1 for the post with this slug and
        returns the new total. Pinged from the public-facing post detail
        page on mount. Unauthenticated by design — anyone visiting a post
        registers a view. The endpoint is idempotent only at the database
        level (each call increments once); the client is expected to fire
        it exactly once per page load.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New view count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostViewCount"
        "404":
          description: Not found

  /blog/featured:
    get:
      operationId: listFeaturedPosts
      tags: [blog]
      summary: Featured posts for the homepage
      responses:
        "200":
          description: Featured posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/categories:
    get:
      operationId: listBlogCategories
      tags: [blog]
      summary: Distinct blog categories with post counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogCategory"

  /pricing/plans:
    get:
      operationId: listPricingPlans
      tags: [pricing]
      summary: List agency pricing plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingPlan"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List agency services
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{slug}:
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service by slug (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmissionInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"

  /newsletter/subscribe:
    post:
      operationId: subscribeToNewsletter
      tags: [newsletter]
      summary: Subscribe an email address to the newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSubscriptionInput"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscription"

  /authors/{slug}/subscribe:
    post:
      operationId: subscribeToAuthor
      tags: [newsletter]
      summary: Subscribe an email to a specific author's mailing list segment
      description: |
        Adds the email to the global newsletter subscriber list (idempotent on
        email) and links it to the requested author slug. The same email can
        subscribe to multiple authors. Returns `alreadySubscribed: true` when
        the visitor was already subscribed to *this* author.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorSubscriptionInput"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorSubscription"
        "404":
          description: Unknown author slug

  /admin/newsletter/subscribers:
    get:
      operationId: getNewsletterSubscribers
      tags: [newsletter]
      summary: Master newsletter subscriber list with daily signup buckets (admin)
      description: |
        Returns every row in the `newsletter_subscribers` table plus a
        per-day signup time series (last 90 days, zero-filled) for charting,
        and rolling 30-day / 7-day totals. Used by the master `/admin/newsletter`
        dashboard. Requires an authenticated admin session.
      responses:
        "200":
          description: Detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscribersDetail"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required

  /admin/authors/subscribers/summary:
    get:
      operationId: listAuthorSubscriberSummary
      tags: [newsletter]
      summary: Per-author subscriber count summary (admin)
      description: |
        Returns one row per author from the canonical author registry with the
        current count of email subscribers. Used as the index page of the
        subscriber admin dashboard. Requires an authenticated admin session.
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthorSubscriberSummary"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required

  /admin/authors/{slug}/subscribers:
    get:
      operationId: getAuthorSubscriberDetail
      tags: [newsletter]
      summary: Subscribers for a single author with daily signup buckets (admin)
      description: |
        Returns the full subscriber list for one author plus a per-day signup
        time series (last 90 days, zero-filled) for charting. Requires an
        authenticated admin session.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorSubscriberDetail"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required
        "404":
          description: Unknown author slug

  /tools/financial-health-score/email-report:
    post:
      operationId: emailFinancialHealthScoreReport
      tags: [tools]
      summary: Email a Financial Health Score Calculator report and subscribe to the newsletter
      description: |
        Accepts a calculated Financial Health Score plus the visitor's email,
        subscribes them to the newsletter, and (when an email provider is
        configured) sends them an HTML summary of their score and personalized
        tips.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialHealthReportEmailInput"
      responses:
        "200":
          description: Report processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialHealthReportEmailResult"

  /guest-posts:
    post:
      operationId: submitGuestPost
      tags: [guestPost]
      summary: Submit a guest post pitch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestPostSubmissionInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestPostSubmission"

  /stats/trust:
    get:
      operationId: getTrustStats
      tags: [stats]
      summary: Trust signal stats for homepage
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustStats"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [stats]
      summary: Customer testimonials
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  /commissioning-topics:
    get:
      operationId: listCommissioningTopics
      tags: [commissioningTopics]
      summary: List active guest-post topics currently being commissioned
      description: |
        Returns the public-facing list of guest-post angles the editorial team
        is actively commissioning right now. Sorted by priority ascending
        (lower = higher priority), then most recent first. Inactive topics are
        excluded.
      responses:
        "200":
          description: Topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommissioningTopic"

  /admin/commissioning-topics:
    get:
      operationId: listAdminCommissioningTopics
      tags: [commissioningTopics]
      summary: List all commissioning topics including inactive (admin)
      responses:
        "200":
          description: Topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommissioningTopic"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required
    post:
      operationId: createCommissioningTopic
      tags: [commissioningTopics]
      summary: Create a new commissioning topic (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissioningTopicInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissioningTopic"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required

  /admin/commissioning-topics/{id}:
    patch:
      operationId: updateCommissioningTopic
      tags: [commissioningTopics]
      summary: Update a commissioning topic (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissioningTopicInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissioningTopic"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required
        "404":
          description: Topic not found
    delete:
      operationId: deleteCommissioningTopic
      tags: [commissioningTopics]
      summary: Delete a commissioning topic (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — admin access required

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, isAdmin]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        isAdmin:
          type: boolean
          description: True when the signed-in user's email is in the ADMIN_EMAILS allowlist.
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        author:
          type: string
        authorRole:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        coverImage:
          type: string
        readingMinutes:
          type: integer
        featured:
          type: boolean
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          description: >
            Auto-bumped on every edit via Drizzle's `$onUpdate` hook. Equal to
            `publishedAt` for never-edited rows. Surface as a "Last updated"
            indicator in the UI when materially newer than `publishedAt`.
        lastSeoPingAt:
          type: string
          format: date-time
          nullable: true
          description: >
            Timestamp of the most recent successful IndexNow ping for this
            post (Bing/Yandex/Seznam/Naver). `null` when the post has never
            been successfully pinged (e.g. INDEXNOW_KEY was unset or the
            post predates this feature). Surface in the admin posts list as
            an "indexed N ago" badge.
        lastSeoPingStatus:
          type: string
          nullable: true
          description: >
            Status string from the most recent IndexNow attempt, even if
            unsuccessful. One of `accepted`, `rejected`, `skipped_no_key`,
            `skipped_malformed_key`, `error`. `null` for posts that have
            never been pinged.
        viewCount:
          type: integer
          minimum: 0
          description: >
            Lifetime view count, incremented by the public-facing post
            detail page on mount via `POST /blog/posts/{slug}/view`. Used
            to power the "Most read" sort option on the blog index.
        seoTitle:
          type: string
          nullable: true
          description: >
            Optional override for the `<title>` tag on this post's detail
            page. When `null` the title falls back to the post's `title`
            field. Used by the admin to hand-tune SERP appearance.
        seoDescription:
          type: string
          nullable: true
          description: >
            Optional override for `<meta name="description">` on this
            post's detail page. When `null` the description falls back to
            the post's `excerpt`.
        seoOgImage:
          type: string
          nullable: true
          description: >
            Optional override for `og:image` / `twitter:image` on this
            post's detail page. When `null` the social card falls back to
            the post's `coverImage`. Must be an absolute URL pointing to a
            hosted image (1200×630 recommended).
        noIndex:
          type: boolean
          description: >
            When true, the public post detail page emits
            `<meta name="robots" content="noindex,nofollow">` so this post
            is excluded from search engines (still publicly accessible by
            URL). Useful for sponsored, outdated, or work-in-progress posts.
      required: [id, slug, title, excerpt, content, author, authorRole, category, tags, coverImage, readingMinutes, featured, publishedAt, updatedAt, viewCount, noIndex]

