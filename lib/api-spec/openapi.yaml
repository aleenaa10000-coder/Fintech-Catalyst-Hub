    LinkCheckResult:
      type: object
      description: |
        Persistent state for one URL we monitor in the daily sitemap link
        checker. Updated in place per URL on every run.
      properties:
        url:
          type: string
          format: uri
        source:
          type: string
          description: >
            Where this URL came from on the most recent check.
            One of `static`, `blog`, `author`, `rss`, `manual`.
        lastStatusCode:
          type: integer
          nullable: true
          description: >
            HTTP status from the most recent check. `null` when the request
            never completed (DNS failure, network timeout) — see
            `lastError` in that case.
        lastError:
          type: string
          nullable: true
        isBroken:
          type: boolean
          description: >
            True when the most recent check returned 4xx/5xx OR the fetch
            threw.
        brokenSince:
          type: string
          format: date-time
          nullable: true
        lastOkAt:
          type: string
          format: date-time
          nullable: true
        lastCheckedAt:
          type: string
          format: date-time
        consecutiveFailures:
          type: integer
          minimum: 0
      required:
        - url
        - source
        - isBroken
        - lastCheckedAt
        - consecutiveFailures

