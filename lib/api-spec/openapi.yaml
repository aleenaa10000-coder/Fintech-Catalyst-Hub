openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FintechPressHub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: blog
    description: Blog posts
  - name: pricing
    description: Pricing plans
  - name: services
    description: Agency services
  - name: contact
    description: Contact form submissions
  - name: guestPost
    description: Guest post submissions
  - name: stats
    description: Site statistics / trust signals
  - name: newsletter
    description: Newsletter subscriptions
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after callback.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /blog/posts:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List published blog posts
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/posts/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found

  /blog/featured:
    get:
      operationId: listFeaturedPosts
      tags: [blog]
      summary: Featured posts for the homepage
      responses:
        "200":
          description: Featured posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/categories:
    get:
      operationId: listBlogCategories
      tags: [blog]
      summary: Distinct blog categories with post counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogCategory"

  /pricing/plans:
    get:
      operationId: listPricingPlans
      tags: [pricing]
      summary: List agency pricing plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingPlan"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List agency services
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{slug}:
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service by slug (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmissionInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"

  /newsletter/subscribe:
    post:
      operationId: subscribeToNewsletter
      tags: [newsletter]
      summary: Subscribe an email address to the newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterSubscriptionInput"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscription"

  /guest-posts:
    post:
      operationId: submitGuestPost
      tags: [guestPost]
      summary: Submit a guest post pitch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestPostSubmissionInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestPostSubmission"

  /stats/trust:
    get:
      operationId: getTrustStats
      tags: [stats]
      summary: Trust signal stats for homepage
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustStats"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [stats]
      summary: Customer testimonials
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    BlogPost:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        author:
          type: string
        authorRole:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        coverImage:
          type: string
        readingMinutes:
          type: integer
        featured:
          type: boolean
        publishedAt:
          type: string
          format: date-time
      required: [id, slug, title, excerpt, content, author, authorRole, category, tags, coverImage, readingMinutes, featured, publishedAt]

    BlogCategory:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
      required: [name, count]

    PricingPlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tagline:
          type: string
        priceMonthly:
          type: integer
        priceUnit:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
        ctaLabel:
          type: string
        highlighted:
          type: boolean
        sortOrder:
          type: integer
      required: [id, name, tagline, priceMonthly, priceUnit, description, features, ctaLabel, highlighted, sortOrder]

    Service:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        deliverables:
          type: array
          items:
            type: string
        icon:
          type: string
      required: [id, slug, name, tagline, description, deliverables, icon]

    ServiceInput:
      type: object
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 80
        name:
          type: string
          minLength: 1
          maxLength: 120
        tagline:
          type: string
          minLength: 1
          maxLength: 240
        description:
          type: string
          minLength: 1
          maxLength: 4000
        deliverables:
          type: array
          items:
            type: string
        icon:
          type: string
          maxLength: 60
      required: [slug, name, tagline, description, deliverables, icon]

    ContactSubmissionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        company:
          type: string
          maxLength: 120
        phone:
          type: string
          maxLength: 40
        service:
          type: string
          maxLength: 80
        budget:
          type: string
          maxLength: 80
        message:
          type: string
          minLength: 10
          maxLength: 4000
      required: [name, email, message]

    ContactSubmission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, message, createdAt]

    NewsletterSubscriptionInput:
      type: object
      properties:
        email:
          type: string
          format: email
        source:
          type: string
          maxLength: 80
      required: [email]

    NewsletterSubscription:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        source:
          type: string
          nullable: true
        alreadySubscribed:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, email, alreadySubscribed, createdAt]

    GuestPostSubmissionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        website:
          type: string
          maxLength: 200
        topic:
          type: string
          minLength: 4
          maxLength: 200
        category:
          type: string
          maxLength: 80
        pitch:
          type: string
          minLength: 30
          maxLength: 4000
        sampleUrl:
          type: string
          maxLength: 300
      required: [name, email, topic, pitch]

    GuestPostSubmission:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        topic:
          type: string
        pitch:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, topic, pitch, createdAt]

    TrustStats:
      type: object
      properties:
        clientsServed:
          type: integer
        articlesPublished:
          type: integer
        backlinksAcquired:
          type: integer
        averageDomainRating:
          type: integer
      required: [clientsServed, articlesPublished, backlinksAcquired, averageDomainRating]

    Testimonial:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        company:
          type: string
        quote:
          type: string
        rating:
          type: integer
      required: [id, name, role, company, quote, rating]
