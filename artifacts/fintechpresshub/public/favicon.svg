<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Deep navy rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#001F3F"/>

  <g transform="translate(96, 112) scale(2.66)">
    <!-- Three rising bars -->
    <rect x="0" y="56" width="18" height="40" rx="3" fill="#0074D9"/>
    <rect x="29" y="36" width="18" height="60" rx="3" fill="#0074D9"/>
    <rect x="58" y="12" width="18" height="84" rx="3" fill="#0074D9"/>

    <!-- Trajectory lines -->
    <line x1="9"  y1="50" x2="38" y2="30" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="38" y1="30" x2="67" y2="6"  stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.55"/>

    <!-- Nodes -->
    <circle cx="9"  cy="50" r="6" fill="#FFFFFF"/>
    <circle cx="38" cy="30" r="6" fill="#FFFFFF"/>
    <circle cx="67" cy="6"  r="9" fill="#2ECC71"/>
    <circle cx="67" cy="6"  r="3.5" fill="#FFFFFF"/>
  </g>
</svg>
