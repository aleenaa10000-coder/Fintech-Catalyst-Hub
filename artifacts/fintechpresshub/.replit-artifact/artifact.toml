kind = "web"
previewPath = "/"
title = "FintechPressHub"
version = "1.0.0"
id = "artifacts/fintechpresshub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21096

[services.development]
run = "pnpm --filter @workspace/fintechpresshub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintechpresshub", "run", "build" ]
publicDir = "artifacts/fintechpresshub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21096"
BASE_PATH = "/"
