<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <style>
      .navy { fill: #001F3F; }
      .blue { fill: #0074D9; }
      .green { fill: #2ECC71; }
      .stroke-blue { stroke: #0074D9; }
      .stroke-navy { stroke: #001F3F; }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(20, 20)">
    <!-- Subtle rounded square ground (transparent fill, navy stroke) -->
    <rect x="2" y="2" width="116" height="116" rx="22" ry="22"
          fill="none" stroke="#001F3F" stroke-width="4" opacity="0.08"/>

    <!-- Three rising bars (growth chart) -->
    <rect x="22" y="76" width="18" height="30" rx="3" class="blue"/>
    <rect x="51" y="58" width="18" height="48" rx="3" class="blue"/>
    <rect x="80" y="34" width="18" height="72" rx="3" class="blue"/>

    <!-- Connecting lines (network trajectory) -->
    <line x1="31" y1="70" x2="60" y2="52" stroke="#001F3F" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="52" x2="89" y2="28" stroke="#001F3F" stroke-width="3" stroke-linecap="round"/>

    <!-- Network nodes on top of each bar -->
    <circle cx="31" cy="70" r="6" class="navy"/>
    <circle cx="60" cy="52" r="6" class="navy"/>
    <circle cx="89" cy="28" r="8" class="green"/>
    <circle cx="89" cy="28" r="3" fill="#FFFFFF"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(160, 0)">
    <text x="0" y="100"
          font-family="DejaVu Sans, Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="700"
          font-size="64"
          letter-spacing="-1"
          class="navy">FintechPress<tspan class="blue">Hub</tspan></text>
    <text x="2" y="130"
          font-family="DejaVu Sans, Inter, 'Helvetica Neue', Arial, sans-serif"
          font-weight="400"
          font-size="16"
          letter-spacing="3.5"
          fill="#001F3F"
          opacity="0.62">FINTECH SEO &amp; CONTENT MARKETING</text>
  </g>
</svg>
